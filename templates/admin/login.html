{% extends "base.html" %}
{% block title %}管理員登入{% endblock %}

{% block content %}
<section class="hero">
  <div class="container" style="max-width:560px">
    <div class="panel">
      <h1 style="margin-top:0">管理員登入</h1>
      <p class="muted">輸入後台密碼以進入管理介面。</p>
      {% if error %}
      <div class="notice warn" style="margin-bottom:16px">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <input type="hidden" name="next" value="{{ next_path or '/admin' }}" />
        <div class="field">
          <label for="password">密碼</label>
          <input id="password" name="password" type="password" required autofocus />
        </div>
        <button class="btn" type="submit">登入</button>
      </form>
      <p class="muted" style="margin-top:16px">預設密碼：<code>admin123</code></p>
    </div>
  </div>
</section>
{% endblock %}
