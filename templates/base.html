<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}QR 點餐系統{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  {% block head %}{% endblock %}
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">Q</span>
        <span>QR 點餐系統</span>
      </a>
      {% if not is_customer %}
      <nav class="nav">
        <a href="/">前台</a>
        <a href="/kitchen">廚房看板</a>
        <a href="/admin">後台</a>
        <a href="/admin/menu">菜單</a>
        <a href="/admin/tables">桌位</a>
        <a href="/admin/orders">訂單</a>
        {% if is_admin %}<a href="/api/admin/logout">登出</a>{% endif %}
      </nav>
      {% endif %}
    </div>
  </header>

  <main>{% block content %}{% endblock %}</main>

  <footer class="container foot">
    <div>© {{ current_year }} QR 點餐系統</div>
  </footer>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
